name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A2B2A3: ${{ secrets.A2B2A3 }}
          B41CD0: ${{ secrets.B41CD0 }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A2B2A3', '')
          meta_b = os.environ.get('B41CD0', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- 5d2585a410f2eec5202dc0a0665ecf60e7 -->', meta_a)
          if meta_b:
              out = out.replace('<!-- 9b18453594227c951411430e344dc6d912e794210c74c9 -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
